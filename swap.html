<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2P Swap — Zentryx Web3 Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Sora:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#dff0fa;--surface:#f5fbff;--surface2:#f0f8ff;--surface3:#e0f0fb;--border-color:#b8d8f0;--sky:#38bdf8;--sky2:#0ea5e9;--sky3:#0284c7;--cyan:#06b6d4;--gold:#f59e0b;--green:#10b981;--red:#ef4444;--text:#0f2a3f;--text2:#3a6080;--text3:#7aaac8}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes chipIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.bg-fixed{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(56,189,248,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.12) 1px,transparent 1px);background-size:60px 60px}
.bg-vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(186,230,255,.25) 100%)}
.bg-glow-bl{position:absolute;bottom:-120px;left:-80px;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(56,189,248,.2) 0%,rgba(56,189,248,.06) 45%,transparent 70%)}
.bg-glow-tr{position:absolute;top:-80px;right:-80px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(14,165,233,.15) 0%,transparent 65%)}
header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:64px;background:rgba(245,251,255,.95);border-bottom:1px solid var(--border-color);box-shadow:0 2px 16px rgba(56,189,248,.1);backdrop-filter:blur(20px)}
header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--sky),var(--sky2),transparent);opacity:.8}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#e0f4ff,#fff);border:1.5px solid var(--cyan);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-size:1.5rem;font-weight:900;color:var(--cyan);box-shadow:0 0 16px rgba(0,238,255,.3)}
.logo-name{font-family:'Sora',sans-serif;font-size:1.45rem;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:var(--text)}
.logo-sub{display:block;font-family:'JetBrains Mono',monospace;font-size:.5rem;letter-spacing:2px;color:var(--sky2);opacity:.8;text-transform:uppercase;margin-top:2px}
nav a{padding:6px 14px;font-family:'Sora',sans-serif;font-size:.9rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;color:var(--text2);border-radius:3px;transition:all .15s}
nav a:hover,nav a.active{color:var(--sky3);background:rgba(56,189,248,.1)}
.net-badge{display:flex;align-items:center;gap:6px;padding:5px 12px;border:1px solid var(--border-color);border-radius:3px;background:rgba(56,189,248,.08);font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:1px;color:var(--sky3)}
.net-dot{width:6px;height:6px;border-radius:50%;background:var(--sky2);box-shadow:0 0 6px var(--sky2);animation:pulse 2s infinite}
.wallet-btn{padding:8px 20px;background:linear-gradient(135deg,var(--sky2),var(--sky3));border:none;border-radius:6px;font-family:'Sora',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fff;cursor:pointer}
.header-right{display:flex;align-items:center;gap:10px}
main{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:24px 20px 60px}

/* CONNECT SCREEN */
#screen-connect{max-width:560px;margin:60px auto 0;animation:fadeUp .3s ease}
.live-badge{display:inline-flex;align-items:center;gap:8px;padding:4px 14px;border:1px solid rgba(56,189,248,.35);border-radius:20px;font-family:'JetBrains Mono',monospace;font-size:.55rem;letter-spacing:3px;color:var(--sky3);text-transform:uppercase;margin-bottom:20px;background:rgba(56,189,248,.07)}
.live-dot{width:5px;height:5px;background:var(--sky2);border-radius:50%;animation:pulse 1.5s infinite}
.screen-title{font-family:'Sora',sans-serif;font-size:2rem;font-weight:900;color:var(--text);margin-bottom:8px;line-height:1.2}
.screen-sub{font-size:.9rem;color:var(--text2);line-height:1.6;margin-bottom:32px}
.card{background:var(--surface);border:1px solid var(--border-color);border-radius:14px;padding:24px;box-shadow:0 4px 24px rgba(56,189,248,.09);margin-bottom:16px}
.card-label{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:14px}
.code-display{background:var(--surface2);border:1px solid var(--border-color);border-radius:10px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.my-code{font-family:'Sora',sans-serif;font-size:1.6rem;font-weight:900;letter-spacing:4px;color:var(--sky3)}
.copy-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;background:rgba(14,165,233,.1);border:1px solid rgba(14,165,233,.3);border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:1px;color:var(--sky3);cursor:pointer;transition:all .15s}
.copy-btn.copied{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--green)}
.input-label{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:2px;color:var(--text2);text-transform:uppercase;display:block;margin-bottom:6px}
input[type=text]{width:100%;padding:12px 16px;background:var(--surface2);border:1.5px solid var(--border-color);border-radius:8px;font-family:'Sora',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text);outline:none;margin-bottom:12px;transition:border-color .15s}
input[type=text]:focus{border-color:var(--sky2)}
.connect-btn{width:100%;padding:14px;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-size:1rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fff;cursor:pointer;background:var(--surface3);color:var(--text3);transition:all .2s}
.connect-btn.ready{background:linear-gradient(135deg,var(--sky2),var(--sky3));color:#fff}
.connect-btn.gen-ready{background:linear-gradient(135deg,var(--sky2),var(--sky3));color:#fff}

/* TRADE ROOM */
#screen-trade{display:none;grid-template-columns:1fr 340px;gap:16px;align-items:start;animation:fadeUp .3s ease}
.trade-topbar{background:var(--surface);border:1px solid var(--border-color);border-radius:12px;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:12px}
.peer-avatar{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--sky2),var(--cyan));display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-size:.9rem;font-weight:800;color:#fff}
.peer-name{font-family:'Sora',sans-serif;font-size:.9rem;font-weight:800;letter-spacing:2px;color:var(--text)}
.peer-status{display:flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:1px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
.phase-badge{padding:5px 14px;border-radius:20px;font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;background:rgba(14,165,233,.1);border:1px solid rgba(14,165,233,.3);color:var(--sky3)}
.cancel-btn{padding:7px 16px;background:transparent;border:1px solid rgba(239,68,68,.3);border-radius:6px;font-family:'Sora',sans-serif;font-size:.78rem;font-weight:600;color:var(--red);cursor:pointer}
.trade-panels{background:var(--surface);border:1px solid var(--border-color);border-radius:12px;overflow:hidden;display:grid;grid-template-columns:1fr 56px 1fr;margin-bottom:12px}
.panel-header{padding:12px 16px;border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between;background:rgba(240,248,255,.6)}
.panel-label{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:2px;color:var(--text3);text-transform:uppercase}
.panel-who{display:flex;align-items:center;gap:6px}
.panel-dot{width:8px;height:8px;border-radius:50%}
.panel-name{font-family:'Sora',sans-serif;font-size:.72rem;font-weight:700;color:var(--text2)}
.panel-body{min-height:220px;padding:12px;display:flex;flex-direction:column;gap:7px}
.empty-msg{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;opacity:.4;padding:20px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:1px;color:var(--text3)}
.middle-col{display:flex;align-items:center;justify-content:center;border-left:1px solid var(--border-color);border-right:1px solid var(--border-color);background:rgba(240,248,255,.4);font-size:1.2rem}
.asset-chip{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--surface2);border:1px solid var(--border-color);border-radius:8px;animation:chipIn .2s ease}
.asset-chip .emoji{font-size:1.3rem}
.asset-info{flex:1}
.asset-name{font-size:.8rem;font-weight:700;color:var(--text)}
.asset-val{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--text3)}
.rm-btn{width:22px;height:22px;border-radius:50%;background:rgba(239,68,68,.1);border:none;color:var(--red);cursor:pointer;font-size:.7rem}
.confirm-row{background:var(--surface);border:1px solid var(--border-color);border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:16px;margin-bottom:12px}
.confirm-side{flex:1;display:flex;align-items:center;gap:10px}
.confirm-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}
.confirm-text{font-size:.8rem;color:var(--text2)}
.confirm-btn{padding:11px 28px;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fff;cursor:pointer;background:linear-gradient(135deg,var(--green),#059669);white-space:nowrap;transition:all .2s}
.confirm-btn:disabled{background:var(--surface3);color:var(--text3);cursor:not-allowed}
.trade-locked{pointer-events:none;opacity:0.35;user-select:none;}
.trade-locked-msg{text-align:center;font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:2px;color:var(--text3);padding:10px 0 4px;text-transform:uppercase;}
/* INVENTORY */
.inventory-panel{background:var(--surface);border:1px solid var(--border-color);border-radius:12px;padding:16px}
.inv-label{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border-color)}
.inv-item{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--surface2);border:1px solid var(--border-color);border-radius:8px;cursor:pointer;margin-bottom:7px;transition:border-color .15s}
.inv-item:hover{border-color:var(--sky2)}
.inv-name{font-size:.78rem;font-weight:700;color:var(--text)}
.inv-meta{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--text3)}
.add-btn{padding:3px 8px;background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.3);border-radius:4px;font-size:.6rem;color:var(--sky3);cursor:pointer;font-family:'JetBrains Mono',monospace;flex-shrink:0}
</style>
</head>
<body>
<div class="bg-fixed"><div class="bg-grid"></div><div class="bg-vignette"></div><div class="bg-glow-bl"></div><div class="bg-glow-tr"></div></div>
<header>
  <a href="index.html" class="logo">
    <div class="logo-icon">Z</div>
    <div style="display:flex;flex-direction:column;line-height:1">
      <span class="logo-name">Zentryx</span>
      <span class="logo-sub">Web3 Platform</span>
    </div>
  </a>
  <nav style="display:flex;align-items:center;gap:2px">
    <a href="index.html">Home</a><a href="chains.html">Chains</a><a href="swap.html" class="active">Swap</a>
    <a href="leaderboard.html">Leaderboard</a><a href="rewards.html">Rewards</a><a href="about.html">About</a>
  </nav>
  <div class="header-right">
    <div class="net-badge"><div class="net-dot"></div> Base Network</div>
    <button class="wallet-btn" onclick="connectWallet(this)">Connect Wallet</button>
  </div>
</header>

<main>

  <!-- TRADE ROOM -->
  <div id="screen-trade" style="display:grid">
    <div style="grid-column:1/-1">
      <div class="trade-topbar">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="peer-avatar" id="peer-avatar">P</div>
          <div>
            <div class="peer-name" id="peer-label">—</div>
            <div class="peer-status"><div class="status-dot"></div><span style="color:var(--green)">Connected</span></div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="phase-badge" id="phase-badge">Building Offer</div>
          <div id="code-display" style="display:none;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border-color);border-radius:8px;padding:6px 14px;">
            <span style="font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--text3);letter-spacing:1px">YOUR CODE</span>
            <span class="my-code" id="my-code" style="font-family:'Sora',sans-serif;font-size:1rem;font-weight:900;letter-spacing:3px;color:var(--sky3)">—</span>
            <button class="copy-btn" id="copy-btn" onclick="copyCode()" style="padding:4px 10px;font-size:.55rem">Copy</button>
          </div>
          <button class="connect-btn gen-ready" id="gen-btn" onclick="generateCode()" style="width:auto;padding:8px 18px;border-radius:8px;font-size:.82rem" disabled>
            Generate Code
          </button>
          <button class="cancel-btn" onclick="cancelTrade()">Cancel Trade</button>
        </div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="trade-locked-msg" id="lock-msg">⚠ Connect wallet to enable trading</div>
      <div id="trade-body" class="trade-locked" style="display:flex;flex-direction:column;gap:12px">
      <div class="trade-panels">
        <!-- My side -->
        <div>
          <div class="panel-header">
            <span class="panel-label">Your Offer</span>
            <div class="panel-who"><div class="panel-dot" style="background:var(--blue2);box-shadow:0 0 6px rgba(26,119,255,.5)"></div><span class="panel-name">You</span></div>
          </div>
          <div class="panel-body" id="my-offer-body">
            <div class="empty-msg"><div style="font-size:1.8rem">📦</div><div>Add items from your inventory</div></div>
          </div>
        </div>
        <!-- Middle -->
        <div class="middle-col">⇄</div>
        <!-- Peer side -->
        <div>
          <div class="panel-header">
            <span class="panel-label">Peer's Offer</span>
            <div class="panel-who"><div class="panel-dot" style="background:var(--cyan);box-shadow:0 0 6px rgba(6,182,212,.5)"></div><span class="panel-name" id="peer-panel-name">—</span></div>
          </div>
          <div class="panel-body" id="peer-offer-body"></div>
        </div>
      </div>

      <div class="confirm-row">
        <div class="confirm-side">
          <div class="confirm-circle" id="my-circle" style="background:rgba(56,189,248,.1);border:2px solid var(--border2)">?</div>
          <span class="confirm-text">You: <strong id="my-status">Pending</strong></span>
        </div>
        <div class="confirm-side">
          <div class="confirm-circle" id="peer-circle" style="background:rgba(56,189,248,.1);border:2px solid var(--border2)">?</div>
          <span class="confirm-text">Peer: <strong id="peer-status">Waiting...</strong></span>
        </div>
        <button class="confirm-btn" id="confirm-btn" onclick="confirmTrade()">Confirm Trade</button>
      </div>
    </div>
  </div><!-- /trade-body -->

  <div id="inventory-panel-wrap" class="trade-locked">
      <div class="inv-label">Your Inventory</div>
      <div id="inventory"></div>
    </div>
  </div><!-- /inventory-panel-wrap -->
</main>

<script>
const CHARS='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
function genCode(){return Array.from({length:6},()=>CHARS[Math.floor(Math.random()*CHARS.length)]).join('')}
let MY_CODE='';
let CONNECTED_WALLET='';
// Render on load — trade room is shown immediately
renderInventory();
renderPeerOffer();
let myOffer=[];
let myConfirmed=false;

const INVENTORY=[
  {id:'1',name:'Bored Ape #3421',collection:'BAYC',value:'18.5 ETH',emoji:'🦍'},
  {id:'2',name:'CryptoPunk #7804',collection:'Punks',value:'62 ETH',emoji:'👾'},
  {id:'3',name:'Doodle #8754',collection:'Doodles',value:'4.2 ETH',emoji:'🎨'},
  {id:'4',name:'Pudgy Penguin #112',collection:'PPenguin',value:'12 ETH',emoji:'🐧'},
];
const PEER_OFFER=[
  {id:'p1',name:'Azuki #1234',collection:'Azuki',value:'8.5 ETH',emoji:'🌸'},
  {id:'p2',name:'0.5 ETH',collection:'Token',value:'0.5 ETH',emoji:'Ξ'},
];

function generateCode(){
  if(!CONNECTED_WALLET) return;
  const storageKey='zentryx_code_'+CONNECTED_WALLET;
  // Block if this wallet already has a code
  if(localStorage.getItem(storageKey)){
    MY_CODE=localStorage.getItem(storageKey);
    document.getElementById('my-code').textContent=MY_CODE;
    document.getElementById('code-display').style.display='flex';
    return;
  }
  // First time — generate, save permanently, lock the button
  MY_CODE=genCode();
  localStorage.setItem(storageKey, MY_CODE);
  document.getElementById('my-code').textContent=MY_CODE;
  document.getElementById('code-display').style.display='flex';
  const genBtn=document.getElementById('gen-btn');
  genBtn.textContent='Your Code';
  genBtn.disabled=true;
  genBtn.onclick=null;
}
  
function copyCode(){
  navigator.clipboard.writeText(MY_CODE).catch(()=>{});
  const b=document.getElementById('copy-btn');
  b.textContent='✓ Copied';b.classList.add('copied');
  setTimeout(()=>{b.textContent='Copy';b.classList.remove('copied')},2000);
}


function cancelTrade(){
  myOffer=[];myConfirmed=false;
  document.getElementById('my-offer-body').innerHTML='<div class="empty-msg"><div style="font-size:1.8rem">📦</div><div>Add items from your inventory</div></div>';
  document.getElementById('peer-label').textContent='—';
  document.getElementById('peer-avatar').textContent='P';
  document.getElementById('phase-badge').textContent='Building Offer';
  updateConfirmBtn();
}

function renderInventory(){
  const el=document.getElementById('inventory');
  el.innerHTML=INVENTORY.map(a=>`
    <div class="inv-item" onclick="addToOffer('${a.id}')">
      <span style="font-size:1.3rem">${a.emoji}</span>
      <div style="flex:1"><div class="inv-name">${a.name}</div><div class="inv-meta">${a.collection} · ${a.value}</div></div>
      <button class="add-btn">+ Add</button>
    </div>`).join('');
}

function renderPeerOffer(){
  const el=document.getElementById('peer-offer-body');
  el.innerHTML=PEER_OFFER.map(a=>`
    <div class="asset-chip">
      <span class="emoji">${a.emoji}</span>
      <div class="asset-info"><div class="asset-name">${a.name}</div><div class="asset-val">${a.value}</div></div>
    </div>`).join('');
}

function addToOffer(id){
  if(myConfirmed)return;
  if(myOffer.find(a=>a.id===id))return;
  const asset=INVENTORY.find(a=>a.id===id);
  if(asset){myOffer.push(asset);renderMyOffer();}
}

function removeFromOffer(id){
  if(myConfirmed)return;
  myOffer=myOffer.filter(a=>a.id!==id);
  renderMyOffer();
}

function renderMyOffer(){
  const el=document.getElementById('my-offer-body');
  if(myOffer.length===0){
    el.innerHTML='<div class="empty-msg"><div style="font-size:1.8rem">📦</div><div>Add items from your inventory</div></div>';
    return;
  }
  el.innerHTML=myOffer.map(a=>`
    <div class="asset-chip">
      <span class="emoji">${a.emoji}</span>
      <div class="asset-info"><div class="asset-name">${a.name}</div><div class="asset-val">${a.value}</div></div>
      <button class="rm-btn" onclick="removeFromOffer('${a.id}')">✕</button>
    </div>`).join('');
  updateConfirmBtn();
}

function updateConfirmBtn(){
  const btn=document.getElementById('confirm-btn');
  btn.disabled=myOffer.length===0||myConfirmed;
}

function confirmTrade(){
  if(myOffer.length===0||myConfirmed)return;
  myConfirmed=true;
  document.getElementById('my-circle').style.background='rgba(16,185,129,.15)';
  document.getElementById('my-circle').style.borderColor='var(--green)';
  document.getElementById('my-circle').textContent='✓';
  document.getElementById('my-status').style.color='var(--green)';
  document.getElementById('my-status').textContent='Confirmed';
  document.getElementById('phase-badge').textContent='Under Review';
  document.getElementById('phase-badge').style.background='rgba(245,158,11,.1)';
  document.getElementById('phase-badge').style.borderColor='rgba(245,158,11,.3)';
  document.getElementById('phase-badge').style.color='var(--gold)';
  document.getElementById('confirm-btn').textContent='✓ Confirmed';
  document.getElementById('confirm-btn').disabled=true;
  // Simulate peer confirm after 2s
  setTimeout(()=>{
    document.getElementById('peer-circle').style.background='rgba(16,185,129,.15)';
    document.getElementById('peer-circle').style.borderColor='var(--green)';
    document.getElementById('peer-circle').textContent='✓';
    document.getElementById('peer-status').style.color='var(--green)';
    document.getElementById('peer-status').textContent='Confirmed';
    document.getElementById('phase-badge').textContent='✓ Confirmed';
    document.getElementById('phase-badge').style.background='rgba(16,185,129,.1)';
    document.getElementById('phase-badge').style.borderColor='rgba(16,185,129,.3)';
    document.getElementById('phase-badge').style.color='var(--green)';
  },2000);
}

function connectWallet(btn){
  const genBtn=document.getElementById('gen-btn');
  const tradeBody=document.getElementById('trade-body');
  const invWrap=document.getElementById('inventory-panel-wrap');
  const lockMsg=document.getElementById('lock-msg');

  if(btn.dataset.connected){
    // Disconnect
    btn.textContent='Connect Wallet';
    btn.style.background='linear-gradient(135deg,#0ea5e9,#0284c7)';
    btn.style.color='#fff';
    delete btn.dataset.connected;
    CONNECTED_WALLET='';
    MY_CODE='';
    // Lock everything
    tradeBody.classList.add('trade-locked');
    invWrap.classList.add('trade-locked');
    lockMsg.style.display='';
    // Reset generate code UI
    genBtn.disabled=true;
    genBtn.classList.remove('gen-ready');
    genBtn.textContent='Generate Code';
    genBtn.onclick=generateCode;
    document.getElementById('code-display').style.display='none';
    document.getElementById('my-code').textContent='—';
  } else {
    // Connect — simulate wallet address
    const a='0x'+Math.random().toString(16).slice(2,8).toUpperCase()+'...A7F2';
    btn.textContent=a;
    btn.style.background='rgba(16,185,129,.1)';
    btn.style.color='#10b981';
    btn.dataset.connected='1';
    CONNECTED_WALLET=a;
    // Unlock everything
    tradeBody.classList.remove('trade-locked');
    invWrap.classList.remove('trade-locked');
    lockMsg.style.display='none';
    // Check if this wallet already has a saved code
    const storageKey='zentryx_code_'+a;
    const savedCode=localStorage.getItem(storageKey);
    if(savedCode){
      // Restore existing code automatically
      MY_CODE=savedCode;
      document.getElementById('my-code').textContent=MY_CODE;
      document.getElementById('code-display').style.display='flex';
      genBtn.textContent='Your Code';
      genBtn.disabled=true;
      genBtn.onclick=null;
      genBtn.classList.add('gen-ready');
    } else {
      // New wallet — enable generate button
      genBtn.disabled=false;
      genBtn.classList.add('gen-ready');
      genBtn.textContent='Generate Code';
      genBtn.onclick=generateCode;
    }
  }
}
}
</script>
